<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income & Expenses Calculator</title>
</head>
<body>

    <h2>Income & Expenses Calculator</h2>
    
    <label>Work Hours Per Week: <input type="number" value="0" id="workHours" ></label>
    <label>Hourly Pay Rate: <input type="number" value="0" id="payRate" ></label>
    
    <h3>Expenses (Monthly)</h3>
    <label>Groceries: <input type="number" value="0" id="groceries" ></label>
    <label>Rent: <input type="number" value="0" id="rent" ></label>
    <label>Utilities: <input type="number" value="0" id="util" ></label>
    <label>Clothing: <input type="number" value="0" id="clothing" ></label>
    <label>Entertainment: <input type="number" value="0" id="entertainment" ></label>
    <label>Food: <input type="number" value="0" id="food" ></label>
    
    <button id="calculateBtn">Calculate</button>
    <button id="exportBtn">Export</button>
    
    <h3>Results</h3>
    <p>Estimated Pay for the year: $<span id="payResult">0</span></p>
    <p>Total est Expenses for the year: $<span id="expenseResult">0</span></p>
    <p>Remaining Balance: $<span id="balanceResult">0</span></p>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="model.js"></script>
    <script src="view.js"></script>
    <script src="controller.js"></script>

</body>
</html>
